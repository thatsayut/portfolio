version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: rp-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - rp-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: rp-api
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rp-net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: rp-web
    env_file: ./frontend/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rp-net

  postgres:
    image: postgres:16-alpine
    container_name: rp-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rppassword}
      POSTGRES_DB: ${POSTGRES_DB:-reward_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rpuser}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rp-net

  redis:
    image: redis:7-alpine
    container_name: rp-redis
    ports:
      - '6380:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rp-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rp-pgadmin
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rewardplatform.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - tools
    networks:
      - rp-net

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  rp-net:
    driver: bridge

# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo on Render Dashboard → "New Blueprint Instance"

services:
  - type: web
    name: reward-platform-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore  # closest to TH
    plan: free
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false  # set manually — Neon connection string
      - key: REDIS_URL
        sync: false  # set manually — Upstash connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CLIENT_URL
        sync: false  # set manually — your Vercel frontend URL
    healthCheckPath: /api/v1/health
    buildCommand: ""
    startCommand: ""

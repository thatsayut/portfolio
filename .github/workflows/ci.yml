name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rpuser
          POSTGRES_PASSWORD: rppassword
          POSTGRES_DB: reward_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://rpuser:rppassword@localhost:5432/reward_platform_test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test -- --coverage
        env:
          DATABASE_URL: postgresql://rpuser:rppassword@localhost:5432/reward_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://rpuser:rppassword@localhost:5432/reward_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t reward-platform/api:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t reward-platform/web:${{ github.sha }} ./frontend
